<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>DirtyNinja Company Tracker</title>
  <style>
    :root {
      color-scheme: dark;
      --bg: #0f1115;
      --panel: #181c23;
      --ink: #f1f5fb;
      --muted: #9da8b7;
      --line: #303846;
      --accent: #67d6b3;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 24px;
      background: radial-gradient(circle at top, rgba(103, 214, 179, 0.14), transparent 26rem), var(--bg);
      color: var(--ink);
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      letter-spacing: 0;
    }

    main {
      width: min(720px, 100%);
      border: 1px solid var(--line);
      border-radius: 8px;
      background: rgba(24, 28, 35, 0.94);
      padding: 28px;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.32);
    }

    h1 {
      margin: 0 0 10px;
      font-size: clamp(1.8rem, 4vw, 2.7rem);
      line-height: 1.05;
    }

    p {
      margin: 0;
      color: var(--muted);
      line-height: 1.6;
      font-size: 1rem;
    }

    .badge {
      display: inline-flex;
      align-items: center;
      min-height: 30px;
      padding: 0 10px;
      margin-bottom: 18px;
      border: 1px solid rgba(103, 214, 179, 0.42);
      border-radius: 999px;
      color: var(--accent);
      background: rgba(103, 214, 179, 0.08);
      font-weight: 750;
      text-transform: uppercase;
      font-size: 0.78rem;
    }
  </style>
</head>
<body>
  <main>
    <div class="badge">Rebuild ready</div>
    <h1>DirtyNinja Company Tracker</h1>
    <p>The previous tracker code has been removed. This repo is now a clean starting point for the next version.</p>
  </main>
</body>
</html>
